[tool.ruff]
line-length = 100
target-version = "py311"
extend-exclude = ["__pycache__", ".pytest_cache", "build", "dist"]

[tool.ruff.lint]
select = [
    "E",      # pycodestyle errors
    "W",      # pycodestyle warnings
    "F",      # pyflakes
    "I",      # isort
    "UP",     # pyupgrade
    "B",      # flake8-bugbear
    "SIM",    # flake8-simplify
    "S",      # flake8-bandit (security)
    "ASYNC",  # flake8-async
    "PT",     # flake8-pytest-style
    "C4",     # flake8-comprehensions
    "RUF",    # ruff-specific
]
ignore = [
    "S101",   # use of assert (fine in tests)
    "S311",   # use of secrets.token_hex is fine; we explicitly want this
    "B008",   # function call in default argument (FastAPI pattern)
    "E501",   # line length handled by formatter
    "S104",   # binding to 0.0.0.0 in main.py is intentional for a server
    "S603",   # subprocess calls - we don't use any but keep loose
    "S607",   # partial binary path
]

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["S", "PT011", "B017"]
"conftest.py" = ["S"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

[tool.mypy]
python_version = "3.11"
strict = true
warn_unreachable = true
warn_redundant_casts = true
no_implicit_reexport = true
# httpx/pydantic/pytest ship types; fastapi/starlette types come via starlette
ignore_missing_imports = false

# Per-module overrides for third-party libs without stubs
[[tool.mypy.overrides]]
module = ["fastapi.*", "starlette.*"]
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = ["tests.*"]
disallow_untyped_defs = false
strict = false

[[tool.mypy.overrides]]
module = "conftest"
disallow_untyped_defs = false
